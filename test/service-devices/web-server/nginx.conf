events {
    worker_connections 1024;
}

http {
    server_tokens on;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    add_header X-Device-Type "Web-Server";
    add_header X-Device-Model "Web Server X1";
    add_header X-Vendor "WebTech";
    add_header X-Firmware-Version "1.3.7";

    server {
        listen 80;
        server_name localhost;

        location / {

            default_type application/json;

            return 200 '{
                "device": {
                    "id": "web-server-01",
                    "type": "web_server",
                    "model": "Web Server X1",
                    "vendor": "WebTech"
                },
                "network": {
                    "protocol": "HTTP",
                    "port": 80
                },
                "status": "active"
            }';
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {

            default_type application/json;

            return 200 '{
                "device": {
                    "id": "web-server-01",
                    "type": "web_server",
                    "model": "Web Server X1",
                    "vendor": "WebTech"
                },
                "network": {
                    "protocol": "HTTPS",
                    "port": 443
                },
                "status": "active"
            }';
        }
    }
}
