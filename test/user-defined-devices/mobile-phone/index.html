<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laptop (windows)</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        #root > * {
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="root">
        <h2 class="headline">{{HEADLINE}}</h2>
        <h4 class="sub-headline">{{SUBHEADLINE}}</h3>
        <p class="paragraph">{{PARAGRAPH}}</p>
    </div>
</body>
</html>
